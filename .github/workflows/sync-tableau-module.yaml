name: Sync Tableau Module to Portfolio Root

on:
  push:
    branches: [ main ]
    paths:
      - "lab/tableau/**"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Clone or initialize target repo
        env:
          GH_TOKEN: ${{ secrets.SQL_PORTFOLIO_PAT }}
        run: |
          set -euo pipefail

          REPO_URL="https://${GH_TOKEN}@github.com/hovhannisyan91/tableau-analytics-portfolio.git"

          if git ls-remote --exit-code --heads "$REPO_URL" main >/dev/null 2>&1; then
            git clone --depth 1 "$REPO_URL" target
          else
            mkdir target
            cd target
            git init
            git checkout --orphan main
            git remote add origin "$REPO_URL"
          fi

          cd target
          git config user.name "github-actions"
          git config user.email "actions@github.com"

      - name: Sync tableau module into target repo root
        run: |
          rsync -av --delete \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude ".gitignore" \
            --exclude "LICENSE" \
            lab/tableau/ \
            target/

      - name: Commit and push if changed
        run: |
          set -euo pipefail
          cd target
          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Sync Tableau module from course repo"
          git push origin main