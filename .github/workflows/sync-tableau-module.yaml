name: Sync Tableau Module to Portfolio Root

on:
  push:
    branches: [ main ]
    paths:
      - "lab/tableau/**"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Prepare target repo (may be empty)
        env:
          GH_TOKEN: ${{ secrets.SQL_PORTFOLIO_PAT }}
        run: |
          set -euo pipefail
          mkdir -p target
          cd target
          git init
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git remote add origin "https://${GH_TOKEN}@github.com/hovhannisyan91/tableau-analytics-portfolio.git"

          # If the remote already has a main branch, use it; otherwise create one.
          if git ls-remote --exit-code --heads origin main >/dev/null 2>&1; then
            git fetch origin main:refs/remotes/origin/main
            git checkout -B main origin/main
          else
            git checkout -B main
          fi

      - name: Sync tableau module into target repo root (preserve metadata)
        run: |
          rsync -av --delete \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude ".gitignore" \
            --exclude "LICENSE" \
            lab/tableau/ \
            target/

      - name: Commit and push if changed
        env:
          GH_TOKEN: ${{ secrets.SQL_PORTFOLIO_PAT }}
        run: |
          set -euo pipefail
          cd target
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git diff --cached --quiet || git commit -m "Sync Tableau module from course repo"

          CLEAN_TOKEN=$(printf "%s" "$GH_TOKEN")
          git remote set-url origin "https://${CLEAN_TOKEN}@github.com/hovhannisyan91/tableau-analytics-portfolio.git"

          # Handle updates pushed between checkout and push.
          if git ls-remote --exit-code --heads origin main >/dev/null 2>&1; then
            git pull --rebase origin main
          fi

          git push origin HEAD:main

